# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: WOLF-I
email: alejandra.cedenilla-bote@cresym.eu
description: >-
  WOLF-I (Wide-area Oscillations of Low Frequency in the presence of IBRs) is a
  research project on the role of inverter-based resources (IBRs) in damping
  inter-area oscillations in power systems, with reproducible code and a public
  research diary.
baseurl: "/WOLF-I" #the subpath of your site, e.g. /blog
url: "https://cresym.github.io" # the base hostname & protocol for your site, e.g. http://example.com (no trailing slash)
github_username:  Alejandra-CB
lang: en

# SEO metadata (used by jekyll-seo-tag)
author: Alejandra Cedenilla-Bote
logo: /assets/WOLFI.png

# Apply a default social-preview image (og:image) to every page
defaults:
  - scope:
      path: ""
    values:
      image: /assets/WOLFI.png

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Worked, executable examples (rendered from projects/<name>/ with Weave.jl).
collections:
  examples:
    output: true
    permalink: /examples/:name/

# Global assets links
global_asset_link : /assets/WOLFI.png

# Visitor counter (GoatCounter). Set this to your GoatCounter site code
# (the subdomain you choose at https://www.goatcounter.com/signup).
# Leave blank to disable. Only loads on the production site.
goatcounter: wolf-i


# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
